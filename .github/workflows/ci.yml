name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tottenham_stats_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tottenham_stats_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore TottenhamStatsAPI.sln

      - name: Build
        run: dotnet build TottenhamStatsAPI.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test TottenhamStatsAPI.sln --configuration Release --no-build --verbosity normal
        env:
          ConnectionStrings__TestConnection: Host=localhost;Port=5432;Database=tottenham_stats_test;Username=postgres;Password=postgres
